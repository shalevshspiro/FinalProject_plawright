[pytest]
; Headed + slowmo so you can watch the browser while developing locally.
; Before wiring this into CI, switch back to headless: remove --headed --slowmo 500
; (or override per-run with `pytest -p no:cacheprovider --headed=false`-style flags).
addopts = --headed --slowmo 500 --alluredir=allure-results

markers =
    smoke: fast critical-path checks (login, cart, checkout happy paths)
    regression: broader functional coverage, run on full regression passes
    e2e: full end-to-end user journeys spanning multiple pages
    api: tests that hit the API directly, no browser page objects
    security: security-focused checks (XSS, access control, brute force, injection)
    performance: load/stress and response-time checks
